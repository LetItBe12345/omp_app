name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check source
        run: pnpm check

      - name: Build application
        run: pnpm build

      - name: Check production output
        shell: bash
        run: |
          set -euo pipefail
          if find out -type f -name '*.map' -print -quit | grep -q .; then
            echo '生产构建包含 source map' >&2
            exit 1
          fi
          if rg -n 'OMP UI fixture|tests/fixtures' out/renderer; then
            echo '生产 Renderer 包含测试 fixture' >&2
            exit 1
          fi

  linux-display-smoke:
    name: Linux ${{ matrix.ubuntu }} / ${{ matrix.arch }} / ${{ matrix.display }}
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            ubuntu: '22.04'
            arch: x64
            display: x11
          - runner: ubuntu-22.04
            ubuntu: '22.04'
            arch: x64
            display: wayland
          - runner: ubuntu-24.04
            ubuntu: '24.04'
            arch: x64
            display: x11
          - runner: ubuntu-24.04
            ubuntu: '24.04'
            arch: x64
            display: wayland
          - runner: ubuntu-22.04-arm
            ubuntu: '22.04'
            arch: arm64
            display: x11
          - runner: ubuntu-22.04-arm
            ubuntu: '22.04'
            arch: arm64
            display: wayland
          - runner: ubuntu-24.04-arm
            ubuntu: '24.04'
            arch: arm64
            display: x11
          - runner: ubuntu-24.04-arm
            ubuntu: '24.04'
            arch: arm64
            display: wayland
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Configure Electron sandbox
        shell: bash
        run: |
          set -euo pipefail
          electron_dir="$(dirname "$(node -p "require('electron')")")"
          sandbox_path="$electron_dir/chrome-sandbox"
          test -f "$sandbox_path"
          sudo chown root:root "$sandbox_path"
          sudo chmod 4755 "$sandbox_path"
          stat -c '%U:%G %a %n' "$sandbox_path"

      - name: Install X11 test dependencies
        if: matrix.display == 'x11'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends dbus-x11 xauth xvfb

      - name: Install Wayland test dependencies
        if: matrix.display == 'wayland'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends dbus-x11 weston

      - name: Run display smoke
        run: dbus-run-session -- bash scripts/ci-linux-display-smoke.sh "${{ matrix.display }}"

      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-${{ matrix.ubuntu }}-${{ matrix.arch }}-${{ matrix.display }}
          path: |
            ${{ runner.temp }}/omp-ci/**
            tests/artifacts/*.png
          if-no-files-found: warn
          retention-days: 7
